name: Frontend CD

on:
  push:
    branches: [ deploy-test ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        port: 22
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          # Clone if not exists, otherwise pull latest
          if [ ! -d "~/cpvoucher" ]; then
            git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/hilmihashim472/cpvoucher.git ~/cpvoucher
          fi

          cd ~/cpvoucher
          git fetch --all
          git reset --hard origin/deploy-test
          cd frontend
          npm install
          npm run build
          sudo rm -rf /var/www/html/*
          sudo cp -r dist/* /var/www/html/
          sudo systemctl restart nginx
