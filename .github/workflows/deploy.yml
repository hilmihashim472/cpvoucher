name: Frontend CD

on:
  push:
    branches: [ deploy-test ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        port: 22
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e  # Exit on any error - fixes silent failures

          # Install NVM if not present
          export NVM_DIR="$HOME/.nvm"
          if [ ! -s "$NVM_DIR/nvm.sh" ]; then
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
          fi
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          # Install and use Node.js 22 (Vite 8 requires Node.js 20+)
          nvm install 22
          nvm use 22

          # Clone if not exists, otherwise pull latest
          if [ ! -d "$HOME/cpvoucher" ]; then
            git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/hilmihashim472/cpvoucher.git $HOME/cpvoucher
            cd $HOME/cpvoucher
            git checkout deploy-test
          else
            cd $HOME/cpvoucher
          fi
          git fetch --all
          git reset --hard origin/deploy-test
          cd frontend
          npm install
          npm run build
          # Remove old files and copy new build
          sudo rm -rf /var/www/html/*
          sudo cp -r dist/* /var/www/html/

          # Fix permissions so Nginx can read the files
          sudo chown -R www-data:www-data /var/www/html
          sudo find /var/www/html -type f -exec chmod 644 {} \;
          sudo find /var/www/html -type d -exec chmod 755 {} \;

          # Fix SPA routing: always serve index.html for non-file routes
          if ! grep -q "try_files.*\/index\.html" /etc/nginx/sites-enabled/default; then
            sudo sed -i 's|try_files $uri $uri/ =404;|try_files $uri $uri/ /index.html;|' /etc/nginx/sites-enabled/default
          fi

          sudo systemctl restart nginx